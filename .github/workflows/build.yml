name: Compile Test
on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Install SDL2 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install SDL2 (macOS)
        if: runner.os == 'macOS'
        run: brew install sdl2 sdl2_image sdl2_mixer sdl2_ttf

      - name: Install SDL2 (Windows)
        if: runner.os == 'Windows'
        run: ridk exec pacman -S --noconfirm mingw-w64-ucrt-x86_64-SDL2 mingw-w64-ucrt-x86_64-SDL2_image mingw-w64-ucrt-x86_64-SDL2_mixer mingw-w64-ucrt-x86_64-SDL2_ttf

        # Windows以外のコンパイル (Ubuntu / macOS)
      - name: Compile Extension (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          gem install rake-compiler pkg-config
          rake compile

      # Windows用のコンパイル
      - name: Compile Extension (Windows)
        if: runner.os == 'Windows'
        run: |
          gem install rake-compiler pkg-config
          ridk exec rake compile