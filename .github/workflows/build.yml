name: Build Native Gems
on: [push]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # 全OS共通のツールをインストール
      - name: Install Build Tools
        run: gem install rake-compiler mini_portile2

      # Linuxの時だけ、このステップが実行される（PowerShellエラー回避）
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libpulse-dev

      # C拡張をコンパイル（ここでSDL3のダウンロードとビルドが行われる）
      - name: Compile Extension
        run: rake compile

      # gemspecを読み込んで、今ビルドしたバイナリ入りのGemファイルを作成する
      - name: Build Gem
        run: gem build nxruby.gemspec

      # 完成した *.gem をアーティファクトとしてアップロード
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gem-${{ matrix.os }}
          path: "*.gem"